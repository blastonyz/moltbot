options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _SERVICE: openclaw
  _REGION: us-central1
  _AR_LOCATION: us-central1
  _AR_REPO: openclaw
  _AR_IMAGE: openclaw
  _GEMINI_SECRET: GEMINI_API_KEY_1
  _GATEWAY_TOKEN_SECRET: OPENCLAW_GATEWAY_TOKEN
  _RUNTIME_SA: ""

timeout: 3600s

steps:
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: Ensure Artifact Registry repo
    entrypoint: bash
    args:
      - -ceu
      - |
        if ! gcloud artifacts repositories describe "${_AR_REPO}" --location "${_AR_LOCATION}" >/dev/null 2>&1; then
          echo "Artifact Registry repo '${_AR_REPO}' no existe en '${_AR_LOCATION}'. Creando..."
          gcloud artifacts repositories create "${_AR_REPO}" \
            --repository-format=docker \
            --location="${_AR_LOCATION}" \
            --description="OpenClaw container images"
        else
          echo "Artifact Registry repo '${_AR_REPO}' ya existe."
        fi

  - name: gcr.io/cloud-builders/docker
    id: Build and push image (Buildx)
    entrypoint: bash
    args:
      - -ceu
      - |
        docker buildx create --name cloudbuilder --use || docker buildx use cloudbuilder
        docker buildx build \
          --progress=plain \
          --platform linux/amd64 \
          --file Dockerfile \
          --tag "${_AR_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_AR_IMAGE}:latest" \
          --push \
          .

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: Deploy to Cloud Run
    entrypoint: bash
    args:
      - -ceu
      - |
        SECRET_FLAGS=()
        PROJECT_NUMBER="$(gcloud projects describe "${PROJECT_ID}" --format='value(projectNumber)')"
        RUNTIME_SA="${_RUNTIME_SA}"
        if [ -z "$${RUNTIME_SA}" ]; then
          RUNTIME_SA="$${PROJECT_NUMBER}-compute@developer.gserviceaccount.com"
        fi

        if gcloud secrets describe "${_GATEWAY_TOKEN_SECRET}" >/dev/null 2>&1; then
          if ! gcloud secrets add-iam-policy-binding "${_GATEWAY_TOKEN_SECRET}" \
            --member="serviceAccount:$${RUNTIME_SA}" \
            --role="roles/secretmanager.secretAccessor" >/dev/null 2>&1; then
            echo "ERROR: No se pudo otorgar roles/secretmanager.secretAccessor sobre '${_GATEWAY_TOKEN_SECRET}' al service account '$${RUNTIME_SA}'." >&2
            exit 1
          fi
          SECRET_FLAGS+=(--set-secrets "OPENCLAW_GATEWAY_TOKEN=${_GATEWAY_TOKEN_SECRET}:latest")
          echo "Secret '${_GATEWAY_TOKEN_SECRET}' encontrado. Inyectando OPENCLAW_GATEWAY_TOKEN."
        else
          echo "ERROR: Falta el secret '${_GATEWAY_TOKEN_SECRET}'. OpenClaw requiere OPENCLAW_GATEWAY_TOKEN para --bind lan." >&2
          exit 1
        fi

        if gcloud secrets describe "${_GEMINI_SECRET}" >/dev/null 2>&1; then
          if ! gcloud secrets add-iam-policy-binding "${_GEMINI_SECRET}" \
            --member="serviceAccount:$${RUNTIME_SA}" \
            --role="roles/secretmanager.secretAccessor" >/dev/null 2>&1; then
            echo "ERROR: No se pudo otorgar roles/secretmanager.secretAccessor sobre '${_GEMINI_SECRET}' al service account '$${RUNTIME_SA}'." >&2
            echo "Otorga ese rol en Secret Manager (IAM del secreto) o define _RUNTIME_SA con el SA correcto." >&2
            exit 1
          fi

          SECRET_FLAGS+=(--set-secrets "GEMINI_API_KEY_1=${_GEMINI_SECRET}:latest,GEMINI_API_KEY=${_GEMINI_SECRET}:latest")
          echo "Secret '${_GEMINI_SECRET}' encontrado. Inyectando GEMINI_API_KEY_1/GEMINI_API_KEY con SA '$${RUNTIME_SA}'."
        else
          echo "Secret '${_GEMINI_SECRET}' no existe. Deploy sin Gemini key."
        fi

        gcloud run deploy "${_SERVICE}" \
          --image "${_AR_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_AR_IMAGE}:latest" \
          --region "${_REGION}" \
          --platform managed \
          --allow-unauthenticated \
          --port 8080 \
          "$${SECRET_FLAGS[@]}" \
          --command node \
          --args openclaw.mjs,gateway,--bind,lan,--port,8080,--allow-unconfigured
